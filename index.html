<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#ffffff">
    <meta name="description" content="نظام ERP + CRM متكامل - إدارة الأعمال بذكاء">
    <title>نظام ERP + CRM</title>

    <!-- ربط الـ CSS الأساسي -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/theme.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <!-- ربط الـ PWA Manifest -->
    <link rel="manifest" href="pwa/manifest.json">

    <!-- أيقونة التطبيق (favicon) -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">

    <!-- ما قبل التحميل للخطوط (اختياري) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- حاوية التطبيق الرئيسية -->
    <div id="app">
        <!-- الشريط العلوي (navbar) -->
        <header id="navbar" class="navbar">
            <div class="navbar-container">
                <div class="navbar-brand">
                    <a href="#dashboard" class="brand-link">
                        <img src="assets/icons/logo.svg" alt="شعار التطبيق" class="brand-icon">
                        <span class="brand-name">نظام ERP</span>
                    </a>
                </div>
                <div class="navbar-search">
                    <div class="search-wrapper">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="globalSearch" class="search-input" placeholder="بحث في النظام..." aria-label="بحث عام">
                    </div>
                </div>
                <div class="navbar-actions">
                    <button class="nav-btn notification-btn" id="notificationBtn" aria-label="الإشعارات">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="badge" id="notificationBadge">0</span>
                    </button>
                    <button class="nav-btn messages-btn" id="messagesBtn" aria-label="الرسائل">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span class="badge" id="messagesBadge">0</span>
                    </button>
                    <div class="user-menu">
                        <button class="user-btn" id="userMenuBtn" aria-label="قائمة المستخدم">
                            <img src="assets/images/default-avatar.png" alt="صورة المستخدم" class="user-avatar" id="userAvatar">
                            <span class="user-name" id="userName">المستخدم</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="#profile" class="dropdown-item">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                الملف الشخصي
                            </a>
                            <a href="#settings" class="dropdown-item">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                الإعدادات
                            </a>
                            <hr class="dropdown-divider">
                            <button class="dropdown-item" id="logoutBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                تسجيل الخروج
                            </button>
                            <button class="dropdown-item" id="themeToggleBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                                <span id="themeToggleText">الوضع الليلي</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- المحتوى الرئيسي مع القائمة الجانبية -->
        <div class="app-body">
            <!-- القائمة الجانبية -->
            <aside id="sidebar" class="sidebar">
                <nav class="sidebar-nav">
                    <ul class="sidebar-menu">
                        <li class="menu-item">
                            <a href="#dashboard" class="menu-link active" data-page="dashboard">

                                <span>لوحة التحكم</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#customers" class="menu-link" data-page="customers">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                                <span>العملاء</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#orders" class="menu-link" data-page="orders">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                                <span>الطلبات</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#services" class="menu-link" data-page="services">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                                <span>الخدمات</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#employees" class="menu-link" data-page="employees">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <span>الموظفين</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#attendance" class="menu-link" data-page="attendance">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                <span>الحضور</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#tasks" class="menu-link" data-page="tasks">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 12 11 14 15 10"></polyline></svg>
                                <span>المهام</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#accounting" class="menu-link" data-page="accounting">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                <span>المحاسبة</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#invoices" class="menu-link" data-page="invoices">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline><path d="M3 5v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2z"></path></svg>
                                <span>الفواتير</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#reports" class="menu-link" data-page="reports">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                                <span>التقارير</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#notifications" class="menu-link" data-page="notifications">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                                <span>الإشعارات</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#messages" class="menu-link" data-page="messages">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                                <span>الرسائل</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#files" class="menu-link" data-page="files">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
                                <span>الملفات</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#settings" class="menu-link" data-page="settings">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                <span>الإعدادات</span>
                            </a>
                        </li>
                    </ul>
                </nav>
                <div class="sidebar-footer">
                    <a href="#help" class="menu-link" data-page="help">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                        <span>المساعدة والدعم</span>
                    </a>
                </div>
            </aside>

            <!-- منطقة المحتوى الرئيسي -->
            <main id="main-content" class="main-content">
                <!-- سيتم تحميل الصفحات هنا ديناميكياً عبر الـ Router -->
                <div id="page-container" class="page-container">
                    <!-- محتوى الصفحة الحالية -->
                </div>
            </main>
        </div>

        <!-- حاوية الإشعارات (toasts) -->
        <div id="toast-container" class="toast-container"></div>

        <!-- حاوية المودالات -->
        <div id="modal-container" class="modal-container"></div>
    </div>

    <!-- تحميل مكتبات JavaScript الأساسية -->
    <script src="utils/constants.js" type="module"></script>
    <script src="utils/api.js" type="module"></script>
    <script src="utils/storage.js" type="module"></script>
    <script src="utils/validation.js" type="module"></script>
    <script src="utils/helpers.js" type="module"></script>
    <script src="utils/theme.js" type="module"></script>
    <script src="utils/router.js" type="module"></script>

    <!-- تحميل المكونات الأساسية -->
    <script src="components/navbar/navbar.js" type="module"></script>
    <script src="components/sidebar/sidebar.js" type="module"></script>
    <script src="components/toast/toast.js" type="module"></script>
    <script src="components/modal/modal.js" type="module"></script>
    <script src="components/loader/loader.js" type="module"></script>

    <!-- تحميل المدير الرئيسي للتطبيق -->
    <script src="js/app.js" type="module"></script>

    <!-- تسجيل Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/pwa/service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully:', registration);
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
